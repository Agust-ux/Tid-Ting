<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prosjekt To Do Liste</title>
<link rel="stylesheet" href="style.css">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    :root {
    --color1: #80df6d;
    --color2: #d2ffcf;
    --color3: #ffede5;
    --color4: #fd845c;
    --color5: #7d2982;
    }

    @font-face {
        font-family: "Italianno";
        src: url(Font/Italianno-Regular.ttf);

    }

    @font-face {
        font-family: "Inter";
        src: url(Font/Inter-VariableFont_opsz\,wght.ttf);
        
    }

    @font-face {
        font-family: "ROME";
        src: url(Font/Relationship\ of\ mélodrame.ttf);
        
    }

    body{
        margin: 0;
    }

nav {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 35px;
    background-color: #fff;
    box-shadow: 0 6px 40px rgba(0, 0, 0, 0.4);
    margin: 0;
}

nav img{
    height: 130px;
    width: 130px;
    border: solid 2px #000;
    border-radius: 40px;
}

nav h1 {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    font-family: Italianno;
    font-size: 70px;
    font-weight: 500;
    letter-spacing: 5px;
    color: var(--color5);
}

nav button{
    padding: 5px 20px;
    background-color: #fff;
    border: none;
    border-bottom: solid 2px var(--color4);
    font-family: Inter;
    font-size: 20px;
    margin: 10px;
    font-weight: 300;
    color: #000;
    /* border-radius: 10px; */
}

nav button:hover{
    background-color: var(--color4);
    color: #fff;
    transition: background-color 0.4s ease-in-out, width 0.5s ease-in-out; 
    border-radius: 10px;
}

/* ONLY logo + title links */
nav .logo-link,
nav .title-link {
    text-decoration: none;
    color: inherit;
    display: flex;
    align-items: center;
}

/* image fix */
nav img {
    display: block;
}

/* title fix */
nav .title-link h1 {
    margin: 0;
    line-height: 1;
}

    body {
        background: #ffffff;
        margin: 0;
    }

    .header {
        background: #e6e6e6;
        padding: 20px;
        text-align: center;
        font-size: 28px;
        font-weight: 500;
        border-radius: 10px;
        margin-bottom: 40px;
        margin: 40px;
    }

    .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 40px;
        padding: 40px;
    }

    .project-card {
        background: #e6e6e6;
        padding: 30px;
        border-radius: 20px;
        transition: 0.3s;
        position: relative;
    }

    .project-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .project-card.active {
        border: 4px solid #1976d2;
    }

    .project-title {
        font-size: 26px;
        margin-bottom: 20px;
    }

    .task {
        display: flex;
        align-items: center;
        margin-bottom: 18px;
    }

    .task input {
        margin-right: 10px;
        width: 18px;
        height: 18px;
    }

    .task-details {
        font-size: 14px;
    }

    .task-time {
        font-size: 12px;
        color: #555;
        margin-top: 2px;
    }

    .timeline-btn {
        margin-top: 20px;
        padding: 10px 18px;
        background: #5c5c5c;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.3s;
    }

    .timeline-btn:hover {
        background: #333;
    }

    /* Add Project Button */
    .add-project {
        margin-top: 40px;
        text-align: center;
    }

    .add-project button {
        padding: 12px 25px;
        font-size: 16px;
        border-radius: 25px;
        border: none;
        background: #1976d2;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    .add-project button:hover {
        background: #125ca1;
    }
</style>
</head>

<body>
        <nav>
            <a href="index.html" class="logo-link">
                <img src="Images/Logo.png" alt="Nettside logo">
            </a>

            <a href="index.html" class="title-link">
                <h1>Tid <br> & Ting</h1>
            </a>
        <div id="button_holders">
            <a href="calendar.html"><button>Kalendar</button></a>
            <a href="reminders.html"><button>Påminnelser</button></a>
        </div>
    </nav>
<br>
<div class="header">
    Prosjekt To Do Liste
</div>

<div class="project-grid">

    <div class="project-card">
        <div class="project-title">Prosjekt 1</div>

        <div class="task">
            <input type="checkbox">
            <div class="task-details">
                Task 1
                <div class="task-time">19:00 – 22. mars</div>
            </div>
        </div>

        <div class="task">
            <input type="checkbox">
            <div class="task-details">
                Task 2
                <div class="task-time">19:00 – 22. mars</div>
            </div>
        </div>

        <div class="task">
            <input type="checkbox">
            <div class="task-details">
                Task 3
                <div class="task-time">19:00 – 22. mars</div>
            </div>
        </div>

        <button class="timeline-btn">Se prosjekt tidslinje</button>
    </div>

    <div class="project-card">
        <div class="project-title">Prosjekt 2</div>

        <div class="task">
            <input type="checkbox">
            <div class="task-details">
                UI Design
                <div class="task-time">10:00 – 24. mars</div>
            </div>
        </div>

        <div class="task">
            <input type="checkbox">
            <div class="task-details">
                Backend Setup
                <div class="task-time">14:00 – 25. mars</div>
            </div>
        </div>

        <button class="timeline-btn">Se prosjekt tidslinje</button>
    </div>

    <div class="project-card">
        <div class="project-title">Prosjekt 3</div>

        <div class="task">
            <input type="checkbox">
            <div class="task-details">
                Testing
                <div class="task-time">12:00 – 26. mars</div>
            </div>
        </div>

        <div class="task">
            <input type="checkbox">
            <div class="task-details">
                Deploy
                <div class="task-time">18:00 – 28. mars</div>
            </div>
        </div>

        <button class="timeline-btn">Se prosjekt tidslinje</button>
    </div>

</div>

<div class="add-project">
    <a href="calendar.html"><button>+ Legg til nytt prosjekt</button></a>
</div>

</body>
</html>
